
openapi: 3.0.3
info:
  title: DemandScape Forecast API
  version: "2.0.0"
  description: |
    DemandScape API accessed via Diskover Orchestrator.

    Authentication:
    Authorization: Bearer PARTNER_API_KEY

servers:
  - url: https://demandscape-orchestrator.fly.dev/v1/infer

paths:
  /v1/infer:
    post:
      summary: Generate demand forecasts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputs:
                  type: object
                parameters:
                  type: object
      responses:
        "200":
          description: Forecast response

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
